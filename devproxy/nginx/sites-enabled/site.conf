server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name .porta.local;

        include site-config/ssl.conf;
        include site-config/log.conf;
        include site-config/security.conf;
        include site-config/custom.conf;
        include site-config/general.conf;
}

server {

        listen 80;
        listen [::]:80;
        server_name .porta.local;

        # logging
        include site-config/log.conf;

        # reverse proxy
        location / {
                return 301 https://porta.local$request_uri;
        }
}
