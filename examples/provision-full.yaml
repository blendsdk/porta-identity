# Full-feature provisioning example
#
# Demonstrates ALL provisioning capabilities:
# - Organizations with branding, 2FA policy, login methods
# - Applications with modules
# - Clients (public + confidential) with full OIDC fields + secret config
# - Roles, permissions, and role-permission mappings
# - Custom claim definitions
# - Users with passwords, role assignments, and claim values
# - System config overrides
#
# Usage:
#   porta provision --file examples/provision-full.yaml
#   porta provision --file examples/provision-full.yaml --dry-run
#   porta provision --file examples/provision-full.yaml --mode overwrite

version: "1.0"

# Required when provisioning users with passwords (dev/test only)
allow_passwords: true

organizations:
  - name: Full Demo Corp
    slug: full-demo
    default_locale: en
    default_login_methods:
      - password
      - magic_link
    two_factor_policy: optional

    branding:
      primary_color: "#2563eb"
      company_name: "Full Demo Corp"
      custom_css: |
        .login-container {
          max-width: 420px;
          margin: 0 auto;
        }

    applications:
      - name: Demo Portal
        slug: demo-portal
        description: Full-feature demo application

        modules:
          - name: Dashboard
            slug: dashboard
            description: Main dashboard module
            status: active
          - name: Reports
            slug: reports
            description: Reporting and analytics module
            status: active
          - name: Settings
            slug: settings
            description: Application settings
            status: active

        roles:
          - name: Administrator
            slug: admin
            description: Full access to all features
            permissions:
              - dashboard.read
              - dashboard.write
              - reports.read
              - reports.export
              - settings.read
              - settings.write
              - users.manage
          - name: Manager
            slug: manager
            description: Read/write access, no user management
            permissions:
              - dashboard.read
              - dashboard.write
              - reports.read
              - reports.export
              - settings.read
          - name: Viewer
            slug: viewer
            description: Read-only access
            permissions:
              - dashboard.read
              - reports.read

        permissions:
          - name: View Dashboard
            slug: dashboard.read
          - name: Edit Dashboard
            slug: dashboard.write
          - name: View Reports
            slug: reports.read
          - name: Export Reports
            slug: reports.export
          - name: View Settings
            slug: settings.read
          - name: Edit Settings
            slug: settings.write
          - name: Manage Users
            slug: users.manage

        claim_definitions:
          - name: Department
            slug: department
            claim_type: string
            description: Employee department
          - name: Employee ID
            slug: employee-id
            claim_type: string
            description: Internal employee identifier
          - name: Is Manager
            slug: is-manager
            claim_type: boolean
            description: Whether the user is a people manager

        clients:
          # Public SPA client — PKCE required, no secret
          - client_name: Demo SPA
            client_type: public
            grant_types:
              - authorization_code
              - refresh_token
            redirect_uris:
              - https://porta.local:3443/callback
              - https://porta.local:3443/silent-renew
            post_logout_redirect_uris:
              - https://porta.local:3443
            response_types:
              - code
            scope: openid profile email offline_access
            require_pkce: true

          # Confidential backend client — with secret config
          - client_name: Demo Backend API
            client_type: confidential
            grant_types:
              - authorization_code
              - client_credentials
              - refresh_token
            redirect_uris:
              - http://localhost:4000/auth/callback
            post_logout_redirect_uris:
              - http://localhost:4000
            allowed_origins:
              - http://localhost:4000
            response_types:
              - code
            scope: openid profile email
            token_endpoint_auth_method: client_secret_post
            require_pkce: true
            secret:
              label: demo-backend-secret
              expires_in: 180d

    users:
      - email: admin@full-demo.local
        given_name: Alice
        family_name: Admin
        password: "DemoAdmin123!"
        email_verified: true
        status: active
        roles:
          - app: demo-portal
            role: admin
        claims:
          - app: demo-portal
            claim: department
            value: Engineering
          - app: demo-portal
            claim: employee-id
            value: EMP-001
          - app: demo-portal
            claim: is-manager
            value: true

      - email: manager@full-demo.local
        given_name: Bob
        family_name: Manager
        password: "DemoManager456!"
        email_verified: true
        status: active
        roles:
          - app: demo-portal
            role: manager
        claims:
          - app: demo-portal
            claim: department
            value: Product
          - app: demo-portal
            claim: employee-id
            value: EMP-002
          - app: demo-portal
            claim: is-manager
            value: true

      - email: viewer@full-demo.local
        given_name: Carol
        family_name: Viewer
        password: "DemoViewer789!"
        email_verified: true
        status: active
        roles:
          - app: demo-portal
            role: viewer
        claims:
          - app: demo-portal
            claim: department
            value: Marketing
          - app: demo-portal
            claim: employee-id
            value: EMP-003
          - app: demo-portal
            claim: is-manager
            value: false

# System config overrides (only updates existing config keys)
config:
  access_token_ttl: 1800
  refresh_token_ttl: 86400
  session_ttl: 3600
