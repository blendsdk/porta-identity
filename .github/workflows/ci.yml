# ──────────────────────────────────────────────────────────
# Porta CI — Lint, Build, Test
#
# Runs on every push to main and every pull request.
# Badge: https://github.com/blendsdk/porta-identity/actions/workflows/ci.yml/badge.svg
# ──────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

  # ── Build ───────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        run: yarn build

  # ── Unit Tests ──────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test:unit

  # ── Security Audit ─────────────────────────
  # Checks for known vulnerabilities in dependencies
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Audit dependencies (high + critical)
        run: yarn audit --level high
        continue-on-error: true

  # ── Integration Tests ──────────────────────
  # Requires PostgreSQL, Redis, and MailHog service containers
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: porta_test
          POSTGRES_USER: porta
          POSTGRES_PASSWORD: porta_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U porta"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    env:
      # Test environment variables matching .env.example test section
      DATABASE_URL: postgresql://porta:porta_dev@localhost:5432/porta_test
      TEST_DATABASE_URL: postgresql://porta:porta_dev@localhost:5432/porta_test
      REDIS_URL: redis://localhost:6379/1
      TEST_REDIS_URL: redis://localhost:6379/1
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      TEST_SMTP_HOST: localhost
      TEST_SMTP_PORT: "1025"
      TEST_MAILHOG_URL: http://localhost:8025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Compile TypeScript
        run: yarn build

      - name: Run integration tests
        run: yarn test:integration
