# ──────────────────────────────────────────────────────────
# Porta Release — Semantic Release + npm Publishing
#
# Runs on main branch after CI passes.
# Analyzes commits, determines version, publishes:
#   @portaidentity/sdk → npm
#   @portaidentity/cli → npm
# Creates GitHub release + git tag.
# Docker workflow triggers on v* tags (separate workflow).
# ──────────────────────────────────────────────────────────

name: Release

on:
  workflow_run:
    workflows: ['Build and Test']
    branches: [main]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run if CI succeeded and it was a push (not a PR)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all workspaces
        run: |
          yarn build
          yarn build:sdk
          yarn build:cli

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
