# ──────────────────────────────────────────────────────────
# Porta Docker — Build & Push to Docker Hub
#
# Automated triggers:
#   - CI passes on main → "latest" tag (via workflow_run)
#   - Git tag v* → semver tags (e.g. v1.2.3 → 1.2.3, 1.2, 1, latest)
#   - Manual workflow_dispatch → "latest" + optional custom tag
#
# The workflow_run trigger ensures Docker images are only built
# after the CI workflow (lint, build, all tests) completes successfully.
#
# Also syncs docker/DOCKERHUB.md to the Docker Hub repo description.
#
# Prerequisites (one-time setup):
#   1. Create Docker Hub org "blendsdk" with repo "porta"
#   2. Add GitHub secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# ──────────────────────────────────────────────────────────

name: Docker

on:
  # Run after CI completes successfully on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Run directly on version tags (CI already passed on main before tagging)
  push:
    tags: ['v*']
  # Manual trigger (operator takes responsibility for CI status)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. "0.1.0"). Leave empty for "latest" only.'
        required: false
        default: ''

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    # Only proceed if:
    # - workflow_run: CI completed successfully (skip if CI failed/cancelled)
    # - push tag: always (tags are created after CI passes on main)
    # - workflow_dispatch: always (manual trigger, operator responsibility)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the exact commit that CI tested
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # Generate Docker image tags based on trigger type
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: blendsdk/porta
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      # Set up multi-platform build support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push multi-platform image
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync docker/DOCKERHUB.md to Docker Hub repo description
      # Only runs on main branch builds (not on tag pushes or manual dispatch)
      - name: Update Docker Hub description
        if: github.event_name == 'workflow_run' || github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: blendsdk/porta
          readme-filepath: docker/DOCKERHUB.md
