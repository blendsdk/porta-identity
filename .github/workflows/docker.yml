# ──────────────────────────────────────────────────────────
# Porta Docker — Build & Push to Docker Hub
#
# Triggers:
#   - Git tag v* → semver tags (e.g. v1.2.3 → 1.2.3, 1.2, 1, latest)
#   - Manual workflow_dispatch → "latest" + optional custom tag
#
# NOTE: Auto-publish on main branch CI pass is intentionally disabled.
# While dev happens directly on main, Docker images should only be
# published via manual dispatch or version tags. Re-enable the
# workflow_run trigger when a release branch strategy is adopted.
#
# Also syncs docker/DOCKERHUB.md to the Docker Hub repo description.
#
# Prerequisites (one-time setup):
#   1. Create Docker Hub org "blendsdk" with repo "porta"
#   2. Add GitHub secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# ──────────────────────────────────────────────────────────

name: Docker Release

on:
  # Run directly on version tags (CI already passed on main before tagging)
  push:
    tags: ['v*']
  # Manual trigger (operator takes responsibility for CI status)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. "0.1.0"). Leave empty for "latest" only.'
        required: false
        default: ''

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Generate Docker image tags based on trigger type
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: blendsdk/porta
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      # Set up multi-platform build support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate with Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push multi-platform image
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync docker/DOCKERHUB.md to Docker Hub repo description
      # Only runs on tag pushes (not manual dispatch)
      - name: Update Docker Hub description
        if: github.event_name == 'push'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: blendsdk/porta
          readme-filepath: docker/DOCKERHUB.md
