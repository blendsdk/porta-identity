# ─────────────────────────────────────────────────────────────────────────────
# Porta Dev HTTPS Proxy
#
# TLS-terminating reverse proxy for local development.
# Porta runs on host:3000 (yarn dev), admin-gui on host:4002.
#
# Endpoints:
#   https://porta.local:3443  →  http://host.docker.internal:3000 (Porta)
#   https://porta.local:4443  →  http://host.docker.internal:4002 (Admin GUI)
#
# Certificates: Generated by scripts/setup-certs.sh using mkcert
# ─────────────────────────────────────────────────────────────────────────────

# ─── Porta OIDC Provider — port 3443 ─────────────────────
server {
    listen 3443 ssl;
    server_name porta.local localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Forward to Porta on host machine
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (tsx watch HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ─── Admin GUI — port 4443 ───────────────────────────────
server {
    listen 4443 ssl;
    server_name porta.local localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Forward to admin-gui on host machine
    location / {
        proxy_pass http://host.docker.internal:4002;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (Vite HMR for admin-gui)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
