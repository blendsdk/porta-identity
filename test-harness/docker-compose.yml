# ⚠️ TEST HARNESS ONLY — Do NOT use in production!
# Secrets are hardcoded for reproducible local testing.
# All data is ephemeral (no persistent volumes).
# See: plans/oidc-test-harness/03-docker-infrastructure.md

services:
  # TLS-terminating reverse proxy — Porta is ONLY accessible through nginx
  nginx:
    image: nginx:alpine
    ports:
      - "3443:3443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      porta:
        condition: service_healthy
    networks:
      - harness-network

  # Porta OIDC Provider — development mode with debug logging, behind nginx
  # Uses test-harness/Dockerfile which extends production build with pino-pretty
  porta:
    build:
      context: ..
      dockerfile: test-harness/Dockerfile
    # No port mapping — only accessible through nginx
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      PORT: 3000
      DATABASE_URL: postgres://porta:harness_pr0d_s3cret@postgres:5432/porta
      REDIS_URL: redis://redis:6379
      ISSUER_BASE_URL: https://porta.local:3443
      TRUST_PROXY: "true"
      # ⚠️ TEST HARNESS ONLY — hardcoded secrets (per AR-4)
      COOKIE_KEYS: Xk9mQ2vR7pW4tY6bN8cF3jH5sA0dL1eZq,Rm4nT8wK2xJ6yP0qB3vG5fC7hD9sA1eUp
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@test-harness.local
      SIGNING_KEY_ENCRYPTION_KEY: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0e1f2a3b4c5d6a7b8c9d0e1f2
      TWO_FACTOR_ENCRYPTION_KEY: f1e2d3c4b5a6f7e8d9c0b1a2f3e4d5c6b7a8f9e0d1c2b3a4f5e6d7c8b9a0f1e2
      PORTA_AUTO_MIGRATE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      - harness-network

  # PostgreSQL — ephemeral (no volume)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: porta
      POSTGRES_PASSWORD: harness_pr0d_s3cret
      POSTGRES_DB: porta
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porta -d porta"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - harness-network

  # Redis — ephemeral
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - harness-network

  # MailHog — SMTP capture for magic link and email OTP testing
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - harness-network

networks:
  harness-network:
    driver: bridge
