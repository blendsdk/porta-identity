# OIDC Test Harness — TLS-terminating reverse proxy for Porta
# Porta runs behind nginx on HTTPS (port 3443) in production mode.
# See: plans/oidc-test-harness/03-docker-infrastructure.md

server {
    listen 3443 ssl;
    server_name porta.local localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://porta:3000;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;
    }
}
